<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secondary Colours Adventure</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- SPLASH SCREEN -->

<section id="splashScreen" class="screen active">

    <img
    src="Assets/inovinelogo.png"
    class="splashLogo"
    alt="Inovine Logo">

</section>

<!-- WELCOME SCREEN -->

<section id="welcomeScreen" class="screen">

    <div class="welcomeContent">

        <h1>
        Secondary Colours Adventure
        </h1>

        <p>
        Learn Purple, Orange and Green.
        </p>

        <button id="startBtn">
        Start Game
        </button>

    </div>

</section>

<!-- LEARN COLOURS -->

<section id="learnScreen" class="screen">

    <h2>
    Tap the Colours
    </h2>

    <div class="colourGrid">

        <div class="colourCard purple">
            Purple
        </div>

        <div class="colourCard orange">
            Orange
        </div>

        <div class="colourCard green">
            Green
        </div>

    </div>

    <button id="learnNextBtn">
    Next
    </button>

</section>

<!-- SORTING SCREEN -->

<section id="sortingScreen" class="screen">

    <h2 id="levelTitle">
    Purple Basket
    </h2>

    <p id="levelInstruction">
    Drag the correct objects into the basket.
    </p>

    <div
    id="itemsContainer"
    class="itemsContainer">

    </div>

    <div
    id="basket"
    class="basket">

    Basket

    </div>

</section>

<!-- CELEBRATION -->

<section id="finalScreen" class="screen">

    <img
    src="Assets/inovinelogo.png"
    class="logo">

    <h1>
    🏆 Colour Champion
    </h1>

    <p>
    Fantastic!
    </p>

    <div class="stars">
    ⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐
    </div>

    <button onclick="location.reload()">
    Play Again
    </button>

</section>

<!-- AUDIO -->

<audio
id="correctSound"
src="Assets/correct.mp3">
</audio>

<audio
id="wrongSound"
src="Assets/wrong.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
