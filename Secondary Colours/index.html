<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
Colour Sorting Adventure
</title>

<style>

/* ==========================
GENERAL
========================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(
135deg,
#f5f7fa,
#e8f5e9,
#fff8e1
);
min-height:100vh;
overflow-x:hidden;
}

.screen{
display:none;
min-height:100vh;
text-align:center;
}

.screen.active{
display:block;
}

/* ==========================
TOP BAR
========================== */

#scoreBar{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px;
background:white;
font-size:20px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.15);
z-index:1000;
}

/* ==========================
SPLASH SCREEN
========================== */

#splashScreen{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:white;
}

.splashLogo{
width:350px;
max-width:80%;
animation:pulse 2s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

/* ==========================
WELCOME SCREEN
========================== */

.welcomeBox{
padding-top:140px;
}

h1{
font-size:3rem;
margin-bottom:20px;
color:#333;
}

.instruction{
font-size:1.3rem;
color:#555;
margin-bottom:30px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:15px 35px;
font-size:1.1rem;
font-weight:bold;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

/* ==========================
GAME AREA
========================== */

.gameArea{
padding-top:90px;
padding-left:20px;
padding-right:20px;
}

#levelTitle{
font-size:2.3rem;
margin-bottom:10px;
}

/* ==========================
OBJECT GRID
========================== */

.items{
display:grid;
grid-template-columns:
repeat(2,1fr);

gap:20px;

max-width:700px;

margin:30px auto;
}

.item{

background:white;

padding:12px;

height:170px;

border-radius:18px;

cursor:grab;

box-shadow:
0 4px 12px
rgba(0,0,0,.15);

transition:.3s;
}

.item:hover{

transform:
translateY(-5px);

}

.item img{

width:100%;
height:100%;
object-fit:contain;

}

/* ==========================
BASKET
========================== */

.basket{

width:320px;
height:220px;

margin:40px auto;

position:relative;

display:flex;

justify-content:center;
align-items:center;

font-size:2rem;
font-weight:bold;

color:white;

border-radius:
0 0 140px 140px;

box-shadow:
0 8px 20px
rgba(0,0,0,.25);

transition:.3s;

}

.basket:before{

content:"";

position:absolute;

top:-25px;

left:50%;

transform:
translateX(-50%);

width:220px;

height:40px;

border:8px solid
rgba(255,255,255,.95);

border-bottom:none;

border-radius:
120px 120px 0 0;

}
.basket.correct{

animation:bounce .5s;

}

@keyframes bounce{

0%{
transform:scale(1);
}

50%{
transform:scale(1.1);
}

100%{
transform:scale(1);
}

}

/* ==========================
FINAL SCREEN
========================== */

.finalBox{

padding-top:120px;

}

.logo{

width:220px;

margin-bottom:20px;

}

.final-stars{

font-size:2rem;

margin:25px 0;

}

/* ==========================
MOBILE
========================== */

@media(max-width:768px){

h1{
font-size:2rem;
}

#levelTitle{
font-size:1.7rem;
}

.items{

grid-template-columns:
repeat(2,1fr);

gap:15px;

}

.item{

height:120px;

}

.basket{

width:240px;
height:180px;

font-size:1.4rem;

}

.basket:before{

width:170px;

}

.splashLogo{

width:250px;

}

}

</style>

</head>

<body>

<!-- ==========================
TOP BAR
========================== -->

<div id="scoreBar">

⭐ Stars:
<span id="stars">0</span>

&nbsp;&nbsp;|&nbsp;&nbsp;

Level:
<span id="levelNo">1</span>/3

</div>

<!-- ==========================
SPLASH SCREEN
========================== -->

<section
id="splashScreen"
class="screen active">

<img
src="Assets/inovinelogo.png"
class="splashLogo"
alt="Inovine Logo">

</section>

<!-- ==========================
WELCOME SCREEN
========================== -->

<section
id="welcome"
class="screen">

<div class="welcomeBox">

<h1>

Colour Sorting Adventure

</h1>

<p class="instruction">

Drag all the correct coloured
objects into the basket.

</p>

<button id="startBtn">

▶ Start Game

</button>

</div>

</section>

<!-- ==========================
GAME SCREEN
========================== -->

<section
id="gameScreen"
class="screen">

<div class="gameArea">

<h2 id="levelTitle">

Purple Basket

</h2>

<p
id="instruction"
class="instruction">

Drag all the correct objects
into the basket.

</p>

<!-- OBJECTS -->

<div
id="itemsContainer"
class="items">

</div>

<!-- BASKET BELOW OBJECTS -->

<div
id="basket"
class="basket">

Basket

</div>

</div>

</section>

<!-- ==========================
FINAL SCREEN
========================== -->

<section
id="finalScreen"
class="screen">

<div class="finalBox">

<img
src="Assets/inovinelogo.png"
class="logo"
alt="Inovine Logo">

<h1>

🏆 Colour Sorting Champion!

</h1>

<p>

Fantastic! You sorted all
the colours correctly.

</p>

<div class="final-stars">

⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐

</div>

<button
onclick="location.reload()">

🔄 Play Again

</button>

</div>

</section>

<!-- ==========================
AUDIO
========================== -->

<audio
id="correctSound"
src="Assets/correct.mp3">
</audio>

<audio
id="wrongSound"
src="Assets/wrong.mp3">
</audio>

<script>
/* ==========================
GAME DATA
========================== */

let stars = 0;
let currentLevel = 0;
let sortedCount = 0;

const levels = [

{
name:"Purple",
basketColor:"#8e44ad",

correct:[
"purple.png",
"grapes.png",
"bow.png",
"tshirt.png"
]
},

{
name:"Orange",
basketColor:"#ff9800",

correct:[
"orange.jpg",
"orangefruit.png",
"carorange.png",
"ballonorange.png"
]
},

{
name:"Green",
basketColor:"#4CAF50",

correct:[
"green.jpg",
"parrot.png",
"tree.jpg"
]
}

];

/* ==========================
ELEMENTS
========================== */

const splashScreen =
document.getElementById("splashScreen");

const welcome =
document.getElementById("welcome");

const gameScreen =
document.getElementById("gameScreen");

const finalScreen =
document.getElementById("finalScreen");

const startBtn =
document.getElementById("startBtn");

const basket =
document.getElementById("basket");

const itemsContainer =
document.getElementById("itemsContainer");

const levelTitle =
document.getElementById("levelTitle");

const instruction =
document.getElementById("instruction");

const starsDisplay =
document.getElementById("stars");

const levelNo =
document.getElementById("levelNo");

const correctSound =
document.getElementById("correctSound");

/* ==========================
VOICE
========================== */

function speak(text){

if(!window.speechSynthesis)
return;

speechSynthesis.cancel();

const msg =
new SpeechSynthesisUtterance(text);

msg.rate = 0.9;
msg.pitch = 1.15;

speechSynthesis.speak(msg);

}

/* ==========================
10 SECOND SPLASH SCREEN
========================== */

window.addEventListener(
"load",
()=>{

setTimeout(()=>{

splashScreen.classList.remove(
"active"
);

welcome.classList.add(
"active"
);

},10000);

}
);

/* ==========================
START GAME
========================== */

startBtn.addEventListener(
"click",
()=>{

welcome.classList.remove(
"active"
);

gameScreen.classList.add(
"active"
);

loadLevel();

}
);

/* ==========================
LOAD LEVEL
========================== */

function loadLevel(){

sortedCount = 0;

const level =
levels[currentLevel];

levelTitle.innerHTML =
level.name + " Basket";

instruction.innerHTML =
"Drag all the " +
level.name +
" objects into the basket.";

basket.innerHTML =
level.name +
" Basket";

basket.style.background =
level.basketColor;

levelNo.textContent =
currentLevel + 1;

itemsContainer.innerHTML =
"";

let allItems =
[...level.correct];

allItems.sort(
()=>Math.random()-0.5
);

allItems.forEach(file=>{

const item =
document.createElement("div");

item.className = "item";

item.draggable = true;

item.dataset.file = file;

item.innerHTML =
`<img src="Assets/${file}" alt="">`;

item.addEventListener(
"dragstart",
e=>{

e.dataTransfer.setData(
"text/plain",
file
);

}
);

itemsContainer.appendChild(
item
);

});

}

/* ==========================
BASKET EVENTS
========================== */

basket.addEventListener(
"dragover",
e=>{

e.preventDefault();

}
);

basket.addEventListener(
"drop",
e=>{

e.preventDefault();

const file =
e.dataTransfer.getData(
"text/plain"
);

const item =
document.querySelector(
`[data-file="${file}"]`
);

if(item){

item.remove();

}

sortedCount++;

stars++;

starsDisplay.textContent =
stars;

try{

correctSound.currentTime = 0;

correctSound.play();

}catch(err){}

basket.classList.add(
"correct"
);

setTimeout(()=>{

basket.classList.remove(
"correct"
);

},500);

const level =
levels[currentLevel];

if(
sortedCount ===
level.correct.length
){

setTimeout(()=>{

nextLevel();

},1200);

}

}
);

/* ==========================
NEXT LEVEL
========================== */

function nextLevel(){

currentLevel++;

if(
currentLevel <
levels.length
){

loadLevel();

}
else{

finishGame();

}

}

/* ==========================
FINISH GAME
========================== */

function finishGame(){

gameScreen.classList.remove(
"active"
);

finalScreen.classList.add(
"active"
);

speak(
"Fantastic! You sorted all the colours correctly."
);

}

</script>

</body>
</html>
