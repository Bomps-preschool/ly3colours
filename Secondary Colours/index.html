<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Colour Sorting Adventure</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
min-height:100vh;
overflow-x:hidden;
}

.screen{
display:none;
min-height:100vh;
padding:20px;
text-align:center;
}

.screen.active{
display:block;
}

#scoreBar{
position:fixed;
top:0;
left:0;
width:100%;
background:white;
padding:15px;
font-size:20px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.15);
z-index:1000;
}

.logo{
width:220px;
max-width:80%;
margin-top:80px;
margin-bottom:20px;
}

h1{
font-size:3rem;
margin-bottom:15px;
color:#333;
}

h2{
font-size:2.2rem;
margin-bottom:15px;
}

.instruction{
font-size:1.2rem;
margin-bottom:25px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:15px 35px;
border-radius:12px;
font-size:1.1rem;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.gameArea{
padding-top:90px;
}

/* BASKET */

.basket{
width:320px;
height:220px;
margin:20px auto;
border-radius:0 0 150px 150px;
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
font-weight:bold;
color:white;
position:relative;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.basket:before{
content:"";
position:absolute;
top:-25px;
left:50%;
transform:translateX(-50%);
width:220px;
height:40px;
border:8px solid white;
border-bottom:none;
border-radius:120px 120px 0 0;
}

/* ITEMS */

.items{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}

.item{
width:140px;
height:140px;
background:white;
padding:10px;
border-radius:15px;
cursor:grab;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.item img{
width:100%;
height:100%;
object-fit:contain;
}

.final-stars{
font-size:2rem;
margin:20px;
}

@media(max-width:768px){

.logo{
width:180px;
}

h1{
font-size:2rem;
}

.basket{
width:250px;
height:180px;
font-size:1.5rem;
}

.item{
width:100px;
height:100px;
}

}

</style>
</head>

<body>

<div id="scoreBar">
⭐ Stars: <span id="stars">0</span>
|
Level: <span id="levelNo">1</span>/3
</div>

<!-- WELCOME SCREEN -->

<section id="welcome" class="screen active">

<img
src="Assets/inovinelogo.png"
class="logo"
alt="Inovine Logo">

<h1>Colour Sorting Adventure</h1>

<p class="instruction">
Drag the correct coloured objects into the matching basket.
</p>

<button id="startBtn">
▶ Start Game
</button>

</section>

<!-- GAME SCREEN -->

<section id="gameScreen" class="screen">

<div class="gameArea">

<h2 id="levelTitle">
Purple Basket
</h2>

<p id="instruction" class="instruction">
Drag the correct items into the basket.
</p>

<div id="basket" class="basket">
Basket
</div>

<div id="itemsContainer" class="items"></div>

</div>

</section>

<!-- FINAL SCREEN -->

<section id="finalScreen" class="screen">

<img
src="Assets/inovinelogo.png"
class="logo">

<h1>
🏆 Colour Sorting Champion!
</h1>

<p>
Fantastic! You sorted all the colours correctly.
</p>

<div class="final-stars">
⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐
</div>

<button onclick="location.reload()">
🔄 Play Again
</button>

</section>
<!-- AUDIO -->

<audio id="correctSound" src="Assets/correct.mp3"></audio>
<audio id="wrongSound" src="Assets/wrong.mp3"></audio>

<script>

/* ==========================
GAME DATA
========================== */

let stars = 0;
let currentLevel = 0;
let sortedCount = 0;

const levels = [

{
name:"Purple",
basketColor:"#8e44ad",

correct:[
"purple.png",
"grapes.png",
"bow.png"
],

wrong:[
"orangefruit.png",
"tree.jpg",
"parrot.png"
]
},

{
name:"Orange",
basketColor:"#ff9800",

correct:[
"orange.jpg",
"orangefruit.png",
"carorange.png",
"ballonorange.png"
],

wrong:[
"grapes.png",
"tree.jpg",
"parrot.png"
]
},

{
name:"Green",
basketColor:"#4CAF50",

correct:[
"green.jpg",
"parrot.png",
"tree.jpg"
],

wrong:[
"grapes.png",
"orangefruit.png",
"bow.png"
]
}

];

/* ==========================
ELEMENTS
========================== */

const welcome =
document.getElementById("welcome");

const gameScreen =
document.getElementById("gameScreen");

const finalScreen =
document.getElementById("finalScreen");

const startBtn =
document.getElementById("startBtn");

const basket =
document.getElementById("basket");

const itemsContainer =
document.getElementById("itemsContainer");

const levelTitle =
document.getElementById("levelTitle");

const instruction =
document.getElementById("instruction");

const starsDisplay =
document.getElementById("stars");

const levelNo =
document.getElementById("levelNo");

const correctSound =
document.getElementById("correctSound");

const wrongSound =
document.getElementById("wrongSound");

/* ==========================
VOICE
========================== */

function speak(text){

if(!window.speechSynthesis) return;

speechSynthesis.cancel();

const msg =
new SpeechSynthesisUtterance(text);

msg.rate = 0.9;
msg.pitch = 1.15;
msg.volume = 1;

speechSynthesis.speak(msg);

}

/* ==========================
START GAME
========================== */

startBtn.addEventListener(
"click",
()=>{

welcome.classList.remove("active");

gameScreen.classList.add("active");

loadLevel();

}
);

/* ==========================
LOAD LEVEL
========================== */

function loadLevel(){

sortedCount = 0;

const level =
levels[currentLevel];

levelTitle.innerHTML =
level.name + " Basket";

instruction.innerHTML =
"Drag only the " +
level.name +
" coloured items into the basket.";

basket.innerHTML =
level.name + " Basket";

basket.style.background =
level.basketColor;

levelNo.textContent =
currentLevel + 1;

itemsContainer.innerHTML = "";

let allItems = [
...level.correct,
...level.wrong
];

allItems.sort(
()=>Math.random()-0.5
);

allItems.forEach(file=>{

const div =
document.createElement("div");

div.className =
"item";

div.draggable = true;

div.dataset.file = file;

div.innerHTML =
`<img src="Assets/${file}" alt="">`;

div.addEventListener(
"dragstart",
e=>{

e.dataTransfer.setData(
"text/plain",
file
);

}
);

itemsContainer.appendChild(div);

});

speak(
"Drag only the " +
level.name +
" coloured items into the basket."
);

}

/* ==========================
BASKET
========================== */

basket.addEventListener(
"dragover",
e=>{
e.preventDefault();
}
);

basket.addEventListener(
"drop",
e=>{

e.preventDefault();

const file =
e.dataTransfer.getData(
"text/plain"
);

const level =
levels[currentLevel];

if(
level.correct.includes(file)
){

const item =
document.querySelector(
`[data-file="${file}"]`
);

if(item){

item.remove();

}

sortedCount++;

stars++;

starsDisplay.textContent =
stars;

try{
correctSound.currentTime = 0;
correctSound.play();
}catch(e){}

basket.style.transform =
"scale(1.08)";

setTimeout(()=>{

basket.style.transform =
"scale(1)";

},300);

speak("Great job!");

if(
sortedCount ===
level.correct.length
){

setTimeout(()=>{

currentLevel++;

if(
currentLevel <
levels.length
){

loadLevel();

}
else{

finishGame();

}

},1000);

}

}
else{

try{
wrongSound.currentTime = 0;
wrongSound.play();
}catch(e){}

speak("Try again");

}

}
);

/* ==========================
FINISH GAME
========================== */

function finishGame(){

gameScreen.classList.remove(
"active"
);

finalScreen.classList.add(
"active"
);

speak(
"Fantastic. You sorted all the colours correctly. You are a colour sorting champion."
);

}

/* ==========================
WELCOME MESSAGE
========================== */

window.addEventListener(
"load",
()=>{

setTimeout(()=>{

speak(
"Welcome to Colour Sorting Adventure. Press Start Game to begin."
);

},1000);

});

</script>

</body>
</html>
